<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brivanta - Your AI Companion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>Brivanta</h1>
            </div>
            <div class="status">
                <span class="status-indicator online"></span>
                <span>Online</span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome Message -->
            <div class="message bot-message">
                <div class="avatar bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <p><strong>Brivanta:</strong> Hello! I'm Brivanta, your AI companion powered by xAI. I can help with coding, writing, math, analysis, and more. What would you like to explore today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message... (Ctrl+Enter to send)" maxlength="2000">
                <button id="sendBtn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="features">
                <button class="feature-btn" title="Clear Chat">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="feature-btn" title="New Chat">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Brivanta is thinking...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
